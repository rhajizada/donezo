definitions:
  handler.BoardRequest:
    properties:
      name:
        type: string
    type: object
  handler.CreateItemRequest:
    properties:
      description:
        type: string
      title:
        type: string
    type: object
  handler.HealthResponse:
    properties:
      status:
        type: string
    type: object
  handler.UpdateItemRequest:
    properties:
      completed:
        type: boolean
      description:
        type: string
      title:
        type: string
    type: object
  repository.Board:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      lastUpdatedAt:
        type: string
      name:
        type: string
    type: object
  repository.Item:
    properties:
      boardId:
        type: integer
      completed:
        type: boolean
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      lastUpdatedAt:
        type: string
      title:
        type: string
    type: object
info:
  contact: {}
  description: Swagger API documentation for donezo.
  license:
