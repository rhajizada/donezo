        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update an item by ID
      tags:
      - items
  /healthz:
    get:
      description: Get service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.HealthResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Check health
securityDefinitions:
  BearerAuth:
